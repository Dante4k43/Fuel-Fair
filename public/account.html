<div class="app-container">
    <h2>Truck Settings</h2>
    <div class="calculator-card">
        <label>Truck Type</label>
        <select id="truck-type">
            <option value="semi">Semi-Truck (Class 8)</option>
            <option value="box">Box Truck</option>
            <option value="hotshot">Hotshot</option>
            <option value="flatbed">Flatbed</option>
        </select>

        <label>Fuel Type</label>
        <select id="fuel-type">
            <option value="diesel">Diesel</option>
            <option value="reefer">Diesel + Reefer</option>
            <option value="gas">Gasoline</option>
        </select>

        <label>Fair Load Score Threshold</label>
        <input type="number" id="fair-score" value="75" min="0" max="100">

        <label>Avg MPG</label>
        <input type="number" id="default-mpg" value="6.5" step="0.1">
        
        <button class="btn" onclick="saveSettings()">Update Profile</button>
    </div>
</div>
