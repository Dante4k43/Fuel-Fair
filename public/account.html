<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">

    <a href="index.html" style="color: var(--brand-blue); text-decoration: none; float: left;">← Home</a>

    <div class="home-header" style="margin-top: 20px;">
      <h1>Account</h1>
      <p>Manage your login and password.</p>
    </div>

    <!-- Same card sizing + padding style as auth -->
    <div class="card menu-card rectangle auth-card" style="cursor: default;">

      <div id="account-email" class="account-email"></div>

      <div class="account-actions">
        <button id="signout" class="save-btn account-signout">Sign Out</button>
      </div>

      <div id="msg" class="auth-message"></div>

      <h3 class="account-heading">Change Password</h3>

      <!-- Same form class as auth -->
      <form id="pw-form" class="auth-form">
        <label>Current Password</label>
        <input id="current" type="password" required autocomplete="current-password" />

        <label>New Password</label>
        <input id="next" type="password" required autocomplete="new-password" />

        <button id="pw-btn" type="submit" class="primary-btn auth-submit">
          Update Password
        </button>
      </form>

    </div>
  </div>

  <script src="js/account.js"></script>
</body>
</html>
