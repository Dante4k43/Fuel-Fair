<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Fuel Fair | Fuel Map</title>
  <link rel="stylesheet" href="/styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,600&display=swap" rel="stylesheet">
</head>
<body class="dark-body">
  <a href="/index.html">
    <img src="/logo.png" class="site-logo" alt="Fuel Fair Logo">
  </a>

  <div class="app-container">

 <div id="page-header">
  <div class="page-topbar">
    <a href="/saved-loads.html" class="account-home-link">← Back to Saved Loads</a>

    <div class="top-nav-right">
      <a href="account.html" class="profile-btn" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
        </svg>
      </a>
    </div>
  </div>

  <h1 style="margin-bottom:20px; text-align:center;">Fuel Map</h1>
</div>



    <div class="fuel-map-layout">
      <aside class="fuel-panel">
        <h2 id="route-title">Loading route...</h2>
        <div class="muted" id="route-meta">Preparing map...</div>

        <div style="margin-top:16px;">
          <div class="muted" style="margin-bottom:8px;">Fuel Type</div>
          <div id="fuel-type-display" class="station-card">--</div>
        </div>

        <div class="station-list" id="station-list">
          <div class="muted">Stations will appear here.</div>
        </div>
      </aside>

      <section class="fuel-map-box">
        <div id="fuel-map"></div>
      </section>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/js/fuel-map.js"></script>
</body>
</html>
