<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In / Sign Up</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,600&display=swap" rel="stylesheet">
</head>
<body>

  <a href="/index.html">
      <img src="/logo.png" class="site-logo" alt="Fuel Fair Logo">
  </a>

  <div class="app-container">
<div id="page-header">
    <div class="page-topbar">
      <a href="index.html" class="account-home-link">← Home</a>
    </div>

    
  

    <h1 style="margin-bottom:20px; text-align:center;">Welcome</h1>
    
      <p style="text-align: center;">Sign in to save loads and access your account.</p>
  </div>

    <div class="card menu-card rectangle auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button id="tab-signin" class="save-btn active-tab">Sign In</button>
        <button id="tab-signup" class="save-btn">Sign Up</button>
      </div>

      <div id="msg" class="auth-message"></div>

      <form id="auth-form" class="auth-form">

        <label>Email</label>
        <input id="email" type="email" required autocomplete="email" />

        <label>Password</label>
        <input id="password" type="password" required autocomplete="current-password" />

        <div id="confirm-wrap" class="confirm-wrap">
          <label>Confirm Password</label>
          <input id="confirm" type="password" autocomplete="new-password" />
        </div>

        <button id="submit-btn" type="submit" class="primary-btn auth-submit">
          Sign In
        </button>

        <div class="auth-switch">
          <span id="switch-text">Don’t have an account?</span>
          <a href="#" id="switch-link">Sign up</a>
        </div>

      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
