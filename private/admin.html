<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a href="/index.html">
    <img src="/logo.png" class="site-logo" alt="Fuel Fair Logo">
  </a>

  <div class="app-container">
    <div id="page-header">
      <div class="page-topbar">
        <a href="/index.html" class="account-home-link">← Home</a>

        <div class="top-nav-right">
          <a href="/account.html" class="profile-btn" aria-label="Account">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="8" r="4"></circle>
              <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
            </svg>
          </a>
        </div>
      </div>

      <h1 style="margin-bottom:20px; text-align:center;">Admin Console</h1>
    </div>

    <div class="card">
      <h2>Exports</h2>
      <p>Download a CSV of all accepted + rejected loads with user email and truck settings (if available).</p>

      <div class="form-row" style="gap:12px; flex-wrap: wrap;">
        <label>
          From (optional)
          <input id="from-date" type="date" />
        </label>

        <label>
          To (optional)
          <input id="to-date" type="date" />
        </label>

        <button id="export-btn" class="primary-btn">
          Export Loads CSV
        </button>
      </div>

      <div id="admin-status" style="margin-top:12px;"></div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
